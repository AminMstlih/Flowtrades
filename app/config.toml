# ──────────────────────────────────────────────────
# BTC Order Flow Lite — Configuration
# All tuneable parameters. Never hardcode in logic.
# ──────────────────────────────────────────────────

[aggregation]
# Available rolling time windows (minutes)
time_windows_minutes = [1, 5, 15]

# Active window on startup (minutes)
default_window = 5

[detection]
# Minimum imbalance % to highlight a bucket (raised from 70 → 85 to reduce noise)
imbalance_threshold_pct = 85

# Minimum % of candle volume a bucket must represent to qualify for any badge
min_bucket_weight_pct = 10.0

# Minimum trade count per bucket (filters single whale orders)
min_trades_per_bucket = 1

# Volume percentile threshold for absorption flag (top 10% only)
absorption_vol_percentile = 90

# Max price movement % to confirm absorption
absorption_price_pct = 0.05

[exchanges]
# Which exchanges to connect to
enabled = ["okx", "bybit", "binance"]
# Which symbols to ingest
symbols = ["BTC-USDT", "ETH-USDT", "SOL-USDT"]

[symbols]
  [symbols."BTC-USDT"]
  bucket_size = 1.0
  min_volume = 0.1

  [symbols."ETH-USDT"]
  bucket_size = 0.1
  min_volume = 1.0

  [symbols."SOL-USDT"]
  bucket_size = 0.01
  min_volume = 10.0

[display]
# Number of price levels to display simultaneously
rows = 20

# Terminal/UI refresh interval (milliseconds)
refresh_rate_ms = 500

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["http://localhost:5173", "http://localhost:3000"]

[logging]
# Log level: DEBUG, INFO, WARNING, ERROR
level = "INFO"

# Log first N raw payloads on startup for verification
log_first_n_raw = 100
